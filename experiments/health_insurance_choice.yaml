experiment:
  name: health_insurance_choice
  description: "Replication of Johnson et al. (2013) PLOS ONE health insurance choice experiment."
  metadata:
    option_count: 8
    design: complex
  task_prompt: >
    Choose the most cost-effective health insurance policy for the assigned consumer profile.
    Open as many cells as you need, then end the task with submit_choice.
  matrix_mode: fixed
  replications: 10
  budget_usd: 0.0600
  max_turns: 40
  default_tool_cost_usd: 0.00004
  tool_costs:
    view_matrix: 0.00002
    inspect_cell: 0.00005
    submit_choice: 0.00002
  seed: 42
  tools:
    - inspect_cell
    - submit_choice
  model:
    provider: mock
    model_name: mock-v2
    temperature: 1.0
    max_output_tokens: 800
    pricing:
      input_per_million: 2.0
      output_per_million: 10.0
    extra:
      mock_inspections: 24
  participant:
    role: insurance shopper
    profile: >
      You are choosing health insurance for a family of three -- yourself, a partner, and one child. 
      You anticipate making 9 doctor visits and incurring $900 in out-of-pocket health care costs 
      over the next year. Your goal is to select the most cost-effective plan overall considering premiums, copays, and deductibles.
  options:
    - id: plan_a
      display_name: Plan A
      description: Health insurance option A.
      base_score: 0.0
    - id: plan_b
      display_name: Plan B
      description: Health insurance option B.
      base_score: 0.0
    - id: plan_c
      display_name: Plan C
      description: Health insurance option C.
      base_score: 0.0
    - id: plan_d
      display_name: Plan D
      description: Health insurance option D.
      base_score: 0.0
    - id: plan_e
      display_name: Plan E
      description: Health insurance option E.
      base_score: 0.0
    - id: plan_f
      display_name: Plan F
      description: Health insurance option F.
      base_score: 0.0
    - id: plan_g
      display_name: Plan G
      description: Health insurance option G.
      base_score: 0.0
    - id: plan_h
      display_name: Plan H
      description: Health insurance option H.
      base_score: 0.0
  attributes:
    - id: monthly_premium
      display_name: Monthly Premium
      description: The amount you pay every month for this plan.
    - id: doctor_visit_copay
      display_name: Doctor Visit Copay 
      description: The fixed amount you pay for each doctor visit.
    - id: annual_deductible
      display_name: Annual Deductible
      description: The amount you pay out-of-pocket before insurance starts paying.
  cues:
    - id: plan_a_premium
      option_id: plan_a
      attribute_id: monthly_premium
      label: Plan A Monthly Premium
      value: $601
      normative_score: -7.212
    - id: plan_a_copay
      option_id: plan_a
      attribute_id: doctor_visit_copay
      label: Plan A Doctor Visit Copay
      value: $21
      normative_score: -0.189
    - id: plan_a_deductible
